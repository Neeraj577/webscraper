name: Daily Horoscope Scraper

on:
  schedule:
    # Runs every day at 8 AM UTC
    - cron: "0 14 * * *"

  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:

          node-version: 20


      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        run: node scrape.js

      - name: Commit JSON File
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add horoscopes.json
          git commit -m "Update horoscopes" || echo "No changes"

          git push